<div class="ledger-container">
    <h2>Ledger Form</h2>
    
    <div class="ledger-content">
        <div class="form-section">
            <form [formGroup]="ledgerForm" (ngSubmit)="onSubmit()">
                <div class="form-row">
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" formControlName="date" class="form-control">
                    </div>
                    
                    <div class="form-group">
                        <label for="particulars">Particulars (Item/Customer Name)</label>
                        <input type="text" id="particulars" formControlName="particulars" class="form-control">
                    </div>
                    
                    <div class="form-group">
                        <label for="billNo">Bill No.</label>
                        <input type="text" id="billNo" formControlName="billNo" class="form-control">
                    </div>
                    
                    <div class="form-group">
                        <label for="cashDr">Cash (Dr.)</label>
                        <input type="number" id="cashDr" (ngModelChange)="updateBalance()" formControlName="cashDr" class="form-control">
                    </div>
                    
                    <div class="form-group">
                        <label for="expensesCr">Expenses (Cr.)</label>
                        <input type="number" id="expensesCr" (ngModelChange)="updateBalance()" formControlName="expensesCr" class="form-control">
                    </div>
                    
                    <div class="form-group">
                        <label for="balance">Balance</label>
                        <input type="number" id="balance" formControlName="balance" class="form-control" readonly>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary">Add Entry</button>
            </form>
        </div>

        
    </div>
</div>
