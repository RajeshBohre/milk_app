

<div class="bill-form-wrapper">
    <div class="form-header">Entry Form</div>

    <form>
        <div class="form-row">
            <label for="Name">Name</label>
            <input id="Name" name="Name" [(ngModel)]="Name" type="text" placeholder="Enter name" required />
        </div>
        <div class="form-row">
            <label for="milkType">Milk type</label>
            <select id="milkType" name="milkType" [(ngModel)]="milkType" required>
                <option value="" disabled selected>Select milk type</option>
                <option value="Cow">Cow</option>
                <option value="Buffalo">Buffalo</option>
                <option value="Goat">Goat</option>
            </select>
         </div>
        <div class="form-row">
            <label for="quantity">Quantity</label>
            <input id="quantity" name="quantity" [(ngModel)]="quantity" type="text" placeholder="Enter quantity" required />
        </div>

        <div class="form-row">
            <label for="fatContent">Fat</label>
            <input id="fatContent" name="fatContent" [(ngModel)]="fatContent" 
            (ngModelChange)="calculateRate()" type="text" placeholder="Enter fat content" required />
        </div>
        
         <div class="form-row">
            <label for="snf">SNF</label>
            <input id="snf" name="snf" [(ngModel)]="snf" type="text" placeholder="Enter SNF content" required />
         </div>
         <div class="form-row">
            <label for="rate">Rate Per KG</label>
            <input id="rate" name="rate" [(ngModel)]="rate" type="text" placeholder="Enter rate per KG" required />
        </div>
        <div class="form-row">
            <label for="Amount">Amount</label>
            <input id="Amount" name="Amount" [(ngModel)]="Amount" type="number" step="0.01" min="0" placeholder="0.00" required />
        </div>

        <div class="form-row">
            <label for="billDate">Bill Date</label>
            <input id="billDate" name="billDate" [(ngModel)]="billDate" type="date" required />
        </div>

        <div class="actions">
            <button type="submit" (click)="onSubmit()">Save</button>
             <button style="margin-left: 10px;" type="submit" (click)="backToList()">Back</button>
        </div>
       
    </form>
</div>
