<h2>Inventory Details</h2>
<p>Here you can manage your inventory.</p>
<div class="toolbar" style="margin-top:5px; margin-left:10px; display:flex; gap:8px; align-items:center;">
    <button class="btn btn-success" type="button" (click)="addInventoryItem()">Create</button>
    <button class="btn btn-primary" type="button" (click)="editInventoryItem()" [disabled]="false">Edit</button>
    <button class="btn btn-danger" type="button" (click)="deleteInventoryItem()" [disabled]="false">Delete</button>
    <!-- <button class="btn"><i class="fa fa-trash" (click)="deleteEntry()"></i></button> -->
    <!-- <button type="button" class="btn btn-danger" (click)="deleteEntry()" aria-label="Delete">
        <i class="fas fa-trash"></i>
    </button> -->
    <button class="btn btn-danger" type="button" (click)="downloadPdf()" [disabled]="false"> PDF</button>
<!-- <input type="text" placeholder="Search..." (input)="onQuickFilterChanged($event)" style="padding: 5px; border: 1px solid #ccc; border-radius: 4px;"> -->

</div>
<ag-grid-angular
    style="width: 100%; height: 500px;"
    class="ag-theme-alpine"
    [rowData]="rowData"
    [columnDefs]="columnDefs">
</ag-grid-angular>
