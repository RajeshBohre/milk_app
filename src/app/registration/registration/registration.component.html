<h3 style="text-align: center;">User Registration</h3>
<div style="display: flex; text-align: center; justify-content: center;">

<div class="login-container">
        <form action="#" method="POST" class="login-form">
            <h4>Fill your details</h4>
            <div class="input-group">
                <label for="firstName">First Name</label>
                <input type="text" [(ngModel)]="firstName" id="firstName" name="firstName" required>
            </div>
            <div class="input-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" [(ngModel)]="lastName" id="lastName" name="lastName" required>
            </div>
                <div class="input-group">
                        <label for="mobileNumber">Mobile Number</label>
                        <input type="text" [(ngModel)]="mobileNumber" id="mobileNumber" name="mobileNumber" required>
            </div>
             <div class="input-group">
                        <label for="address">Address</label>
                        <input type="text" [(ngModel)]="address" id="address" name="address" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" [(ngModel)]="password" id="password" name="password" required>
            </div>
            <button type="submit" (click)="onRegister()">Register</button>

        </form>
    </div>
