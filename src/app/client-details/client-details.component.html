
<!-- File: client-details.component.html -->
<div class="toolbar" style="margin-top:5px; margin-left:10px; display:flex; gap:8px; align-items:center;">
    <button class="btn btn-success" type="button" (click)="createClient()">Create</button>
    <button class="btn btn-primary" type="button" (click)="editClient()" [disabled]="false">Edit</button>
    <button class="btn btn-danger" type="button" (click)="deleteEntry()" [disabled]="false">Delete</button>
    <button class="btn btn-primary" type="button" (click)="paymentToClient()" [disabled]="false">Payment</button>
    <button class="btn btn-danger" type="button" (click)="downloadPdf()" [disabled]="false"> PDF</button>
<input type="text" placeholder="Search..." (input)="onQuickFilterChanged($event)" style="margin-left: auto; padding: 5px; border: 1px solid #ccc; border-radius: 4px;">
</div>
<div class="client-details" style="margin-top: 5px;">
    <!-- Toolbar: quick filter, actions -->
    

    <!-- AG Grid -->
    <ag-grid-angular
        class="ag-theme-alpine"
        style="width:100%; height:600px;"
        [rowData]="rowData"
        [columnDefs]="columnDefs"
        [defaultColDef]="defaultColDef"
        (gridReady)="onGridReady($event)"
        [pagination]="true"
        [paginationPageSize]="20"
        rowSelection="multiple"
        [animateRows]="true"
        [rowMultiSelectWithClick]="true"
        
    >
    </ag-grid-angular>
</div>
