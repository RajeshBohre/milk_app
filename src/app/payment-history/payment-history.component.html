<div class="toolbar" style="margin-top:5px; margin-left:10px; display:flex; gap:8px; align-items:center;">
    <button class="btn btn-success" type="button" (click)="addLedgerEntry()">Add Entry</button>
    <button class="btn btn-primary" type="button" (click)="editLedgerEntry()" [disabled]="false">Edit Entry</button>
    <!-- <button class="btn btn-danger" type="button" (click)="deleteLedgerEntry()" [disabled]="false">Delete Entry</button> -->
</div>
<div class="table-section">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Particulars</th>
                        <th>Bill No.</th>
                        <th>Cash (Dr.)</th>
                        <th>Expenses (Cr.)</th>
                        <th>Balance</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let entry of ledgerEntries">
                        <td>{{ entry.date }}</td>
                        <td>{{ entry.particulars }}</td>
                        <td>{{ entry.billNo }}</td>
                        <td>{{ entry.cashDr }}</td>
                        <td>{{ entry.expensesCr }}</td>
                        <td>{{ entry.balance }}</td>
                    </tr>
                </tbody>
            </table>
        </div>
